version: '3.8'

services:
  app:
    build: .
    ports:
      - "8010:8010"
    volumes:
      - ./data:/app/data
      - ./config.local.json:/app/config.local.json:ro
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY:-}
      - PYTHONPATH=.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: sqa_frontend
    ports:
      - "5173:5173"
    depends_on:
      - app
    command: ["npm", "run", "dev"]
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
